name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python -m py_compile app.py scheduler_utils.py scheduler_algorithms.py scheduler_engine.py scheduler_insights.py scheduler_service.py tests/test_app.py

      - name: Run test suite
        run: |
          python -m unittest discover -s tests -p "test_*.py"
